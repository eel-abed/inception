version: '3.8'

services:
  mariadb:
    # Nom de l'image qui sera buildée (doit être le même que le service selon le sujet)
    image: mariadb
    container_name: mariadb
    build: 
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    # Le conteneur doit redémarrer automatiquement en cas de crash
    restart: always
    env_file:
      - .env
    secrets:
      - db_password
      - db_root_password
    volumes:
      - mariadb:/var/lib/mysql
    networks:
      - inception

  wordpress:
    image: wordpress
    container_name: wordpress
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    secrets:
      - db_password
      - credentials.txt
    volumes:
      - wordpress:/var/www/wordpress
    networks:
      - inception
    depends_on:
      - mariadb

  nginx:
    image: nginx
    container_name: nginx
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    restart: always
    # NGINX est le seul à exposer un port vers l'extérieur (le 443 imposé par le sujet)
    ports:
      - "443:443"
    # NGINX a aussi besoin d'accéder au volume wordpress pour lire les fichiers statiques (html/css)
    volumes:
      - wordpress:/var/www/wordpress
    networks:
      - inception
    depends_on:
      - wordpress

# Déclaration des named volumes qui pointeront vers les dossiers physiques sur ta machine/VM
volumes:
  mariadb:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/eel-abed/data/mariadb
  wordpress:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/eel-abed/data/wordpress

# Création du réseau interne pour la communication entre les conteneurs
networks:
  inception:
    name: inception
    driver: bridge

# Importation externe des secrets depuis le dossier parent
secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials.txt:
    file: ../secrets/credentials.txt
